name: WCA Ingest

on:
  schedule:
    # Hourly. GH Actions schedules are in UTC and not guaranteed to the minute.
    - cron: '0 * * * *'
  workflow_dispatch:
    inputs:
      force:
        description: 'Force re-import even if export_date has not changed'
        type: boolean
        default: false

concurrency:
  group: wca-ingest
  cancel-in-progress: false

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      FORCE_INGEST: ${{ inputs.force && '1' || '0' }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run ingest
        working-directory: ingest
        run: pnpm run ingest
