<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" role="img" aria-label="Speedcube Ratings">
  <title>Speedcube Ratings</title>
  <!-- Paper ground so the icon reads on dark browser chrome too -->
  <rect width="32" height="32" rx="4" fill="#18171c"/>
  <!--
    A 3x3 cube face as a scrambled mix of the classic WCA colours.
    Tiles are 8px with a 1px gutter, leaving a ~2px frame. The
    centre tile takes our crimson editorial accent so the favicon
    stays connected to the site's palette.
  -->
  <g>
    <!-- row 1 -->
    <rect x="3"  y="3"  width="8" height="8" rx="1.25" fill="#f5f5f0"/>
    <rect x="12" y="3"  width="8" height="8" rx="1.25" fill="#ff8c1a"/>
    <rect x="21" y="3"  width="8" height="8" rx="1.25" fill="#1fae4d"/>
    <!-- row 2 -->
    <rect x="3"  y="12" width="8" height="8" rx="1.25" fill="#ffd73a"/>
    <rect x="12" y="12" width="8" height="8" rx="1.25" fill="#c03028"/>
    <rect x="21" y="12" width="8" height="8" rx="1.25" fill="#1a5fd8"/>
    <!-- row 3 -->
    <rect x="3"  y="21" width="8" height="8" rx="1.25" fill="#1fae4d"/>
    <rect x="12" y="21" width="8" height="8" rx="1.25" fill="#f5f5f0"/>
    <rect x="21" y="21" width="8" height="8" rx="1.25" fill="#ffd73a"/>
  </g>
</svg>
